version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - ../apps/dashboard/dist:/srv/dashboard
    depends_on:
      - api

  api:
    build:
      context: ../
      dockerfile: ./infra/api.Dockerfile
    restart: unless-stopped
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/sms-gateway
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=super-secret-key-change-in-production
      - JWT_EXPIRES_IN=7d
    depends_on:
      - mongodb
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
  redis_data:
  caddy_data:
  caddy_config:
